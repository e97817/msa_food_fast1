# ---------------------------------------- POSTGRES --------------------------------------------------------------------------
# Datasource para POSTGRES

# configure your datasource


quarkus.datasource.username = postgres
quarkus.datasource.password = 
quarkus.datasource.jdbc.url = jdbc:postgresql://localhost:5432/food_fast
quarkus.datasource.db-kind = postgresql


# quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.generation=update




# ---------------------------------------------------------------------------------
quarkus.jackson.fail-on-unknown-properties=false

%dev.quarkus.http.host=0.0.0.0


%dev.quarkus.http.cors = true
%dev.quarkus.http.cors.origins = *
%dev.quarkus.http.cors.methods=GET,PUT,POST
%dev.quarkus.http.cors.headers=keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,authorization,x-requested-with
%dev.quarkus.http.cors.access-control-max-age=24H


app.locale.language=en
app.locale.country=US
